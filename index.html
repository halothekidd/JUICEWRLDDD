<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juice WRLD Tracker</title>

<link rel="stylesheet" href="style.css">
<script defer src="fetch-data.js"></script>
<script defer src="player.js"></script>
<script defer src="auth.js"></script>
<script defer src="playlists.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:white;
}

/* TOP NAV */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#111;
    border-bottom:1px solid #222;
}

.navbar button{
    background:none;
    border:none;
    color:white;
    margin:0 10px;
    cursor:pointer;
    font-size:14px;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:20px;
}

select, input, button{
    padding:10px;
    border-radius:10px;
    border:1px solid #333;
    background:#1a1a1a;
    color:white;
}

/* STATS */
.stats{
    text-align:center;
    color:#aaa;
    font-size:14px;
    padding:10px;
}

/* SONG LIST */
.song-container{
    height:55vh;
    overflow-y:auto;
    padding:10px;
    border-top:1px solid #222;
}

.song{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #222;
}

/* LYRICS */
.page{
    display:none;
    padding:20px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    border-top:1px solid #222;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
}

.vinyl{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#333;
    animation:spin 5s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.player-info{
    display:flex;
    align-items:center;
    gap:10px;
}

.player-controls button{
    margin:0 5px;
}

input[type=range]{
    width:120px;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div>
        <button onclick="showPage('tracker')">Tracker</button>
        <button onclick="showPage('lyrics')">Lyrics</button>
        <button onclick="showPage('files')">Files</button>
        <button onclick="showPage('player')">Music Player</button>
        <button onclick="alert('Add your PayPal/CashApp link')">Support Us</button>
    </div>
</div>

<!-- CONTROLS -->
<div class="controls">

    <select id="era" onchange="filterSongs(this.value, document.getElementById('category').value)">
        <option value="">Era</option>
    </select>

    <select id="category" onchange="filterSongs(document.getElementById('era').value, this.value)">
        <option value="">Category</option>
        <option value="released">Released</option>
        <option value="unreleased">Unreleased</option>
        <option value="unsurfaced">Unsurfaced</option>
        <option value="studio_sessions">Studio Sessions</option>
    </select>

    <input placeholder="Search songs..." oninput="searchSongs(this.value)">

    <button onclick="refreshAPI()">Refresh API</button>

    <select onchange="sortSongs(this.value)">
        <option value="default">Sort By</option>
        <option value="dateSurfaced">Date Surfaced</option>
        <option value="dateRecorded">Date Recorded</option>
        <option value="length">Length</option>
    </select>

</div>

<!-- STATS -->
<div class="stats" id="stats">
    Loading stats...
</div>

<!-- TRACKER PAGE -->
<div id="tracker" class="page" style="display:block;">
    <div class="song-container" id="songList">
        Loading songs...
    </div>
</div>

<!-- LYRICS PAGE -->
<div id="lyrics" class="page">
    <input placeholder="Search lyrics..." style="width:100%;padding:10px;">
    <div style="margin-top:20px;">Lyrics results appear here</div>
</div>

<!-- FILES PAGE -->
<div id="files" class="page">
    <h2>Files</h2>

    <input placeholder="Search files..." style="width:100%;padding:10px;margin-bottom:10px;">

    <div>
        <p>Compilation</p>
        <p>Footage</p>
        <p>Original Files</p>
        <p>Session Edits</p>
        <p>Snippets</p>
        <p>Older Snippets</p>
        <p>Studio Sessions</p>
    </div>
</div>

<!-- PLAYER PAGE -->
<div id="player" class="page">
    <h2>Music Player</h2>
</div>

<!-- PLAYER BAR -->
<div class="player">

    <div class="player-info">
        <div class="vinyl" id="cover"></div>
        <div>
            <div id="title">Select a song</div>
            <div style="font-size:12px;color:#aaa;">Unknown Artist</div>
        </div>
    </div>

    <div class="player-controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="togglePlay()">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <input type="range" id="seek">
    <input type="range" id="volume">

</div>

</body>
</html>
